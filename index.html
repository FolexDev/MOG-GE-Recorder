<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOG-GE Stream Recorder</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/FolexDev/MOG-GE-Recorder/a6adc87ce61164d1dd35a00a4824bc7b7b917d33/One-Lac%20Shade%20Recorder.png"/>
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/FolexDev/MOG-GE-Recorder/a6adc87ce61164d1dd35a00a4824bc7b7b917d33/One-Lac%20Shade%20Recorder.png"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MOG Recorder"/>
  <meta name="theme-color" content="#0f0f0f"/>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --border: #2a2a2a;
      --border2: #333;
      --text: #f0f0f0;
      --text2: #999;
      --text3: #555;
      --accent: #DC0814;
      --accent-dark: #9A0610;
      --accent-hover: #b5060f;
      --wave-color: #a5151d;
      --green: #1D9E75;
      --orange: #EF9F27;
      --blue: #378ADD;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app { width: 100%; max-width: 520px; }

    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
    .logo { width: 36px; height: 36px; flex-shrink: 0; }
    .header-text h1 { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
    .header-text p { font-size: 12px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; }

    /* Sélecteur de flux */
    .stream-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 0.75rem;
    }
    .stream-btn {
      height: 40px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text2);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .stream-btn:hover { background: var(--bg2); }
    .stream-btn.active-onefm {
      background: rgba(220,8,20,0.12);
      border-color: #DC0814;
      color: #DC0814;
    }
    .stream-btn.active-lac {
      background: rgba(63,207,213,0.12);
      border-color: #3FCFD5;
      color: #3FCFD5;
    }
    .stream-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      color: var(--text2);
      margin-bottom: 0.75rem;
    }

    .status-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .waveform-container { height: 52px; margin-bottom: 1rem; border-radius: 4px; overflow: hidden; }
    canvas#waveform { width: 100%; height: 100%; display: block; }

    .timers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .timer-block {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.625rem 0.875rem;
    }
    .timer-label {
      font-size: 11px; color: var(--text2);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px;
    }
    .timer-value {
      font-size: 22px; font-weight: 500;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: -0.02em; color: var(--text3);
    }
    .timer-value.active { color: var(--text); }
    .timer-value.rec { color: var(--accent); }

    .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 1rem; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 0.5s linear; }

    .status-line { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
    .dot.buffering { background: var(--orange); animation: pulse 1.2s ease-in-out infinite; }
    .dot.ready     { background: var(--green); }
    .dot.recording { background: var(--accent); animation: pulse 0.8s ease-in-out infinite; }
    .dot.done      { background: var(--green); }
    .dot.error     { background: #E24B4A; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.625rem; }
    .btn {
      width: 100%; height: 50px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-md);
      background: var(--bg); color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 0.625rem;
    }
    .btn:hover { background: var(--bg2); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { background: var(--bg2); border-color: var(--border); color: var(--text3); cursor: not-allowed; transform: none; }

    .btn.start { background: var(--text); border-color: var(--text); color: var(--bg); }
    .btn.start:hover { opacity: 0.88; }
    .btn.start:disabled { background: var(--bg2); border-color: var(--border); color: var(--text3); opacity: 1; }

    .btn.trigger { background: var(--accent); border-color: var(--accent-dark); color: white; margin-bottom: 0; }
    .btn.trigger:hover { background: var(--accent-hover); }
    .btn.trigger:disabled { background: var(--bg2); border-color: var(--border); color: var(--text3); }

    .btn.stop-cap { border-color: var(--accent-dark); color: var(--accent); margin-bottom: 0; }
    .btn.stop-cap:disabled { border-color: var(--border); color: var(--text3); }

    .btn.stop-stream { border-color: var(--border2); color: var(--text2); }
    .btn.mute { border-color: var(--border2); color: var(--text2); }
    .btn.mute.active { border-color: var(--orange); color: var(--orange); }

    kbd {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      padding: 1px 5px; border-radius: 3px;
      background: rgba(255,255,255,0.12);
      border: 0.5px solid rgba(255,255,255,0.2);
      margin-left: 4px; vertical-align: middle; letter-spacing: 0;
    }

    .config-section { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 0.75rem; }
    .config-toggle {
      width: 100%; background: var(--bg); border: none;
      padding: 0.75rem 1.125rem;
      font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--text2); cursor: pointer; text-align: left;
      display: flex; align-items: center; justify-content: space-between;
    }
    .config-toggle:hover { background: var(--bg2); }
    .config-body { display: none; padding: 0.875rem 1.125rem 1.125rem; border-top: 0.5px solid var(--border); background: var(--bg); }
    .config-body.open { display: block; }

    .field { margin-bottom: 0.625rem; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block; font-size: 11px; color: var(--text2);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px;
    }
    .field input, .field select {
      width: 100%; height: 34px; padding: 0 10px;
      border: 0.5px solid var(--border2); border-radius: var(--radius-md);
      background: var(--bg2); color: var(--text);
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    }
    .field input:focus, .field select:focus { outline: none; box-shadow: 0 0 0 2px var(--border2); }

    .log-area { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); min-height: 18px; line-height: 1.5; margin-bottom: 0.75rem; }
    .files-list { margin-bottom: 0.75rem; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.875rem; background: var(--bg);
      border: 0.5px solid var(--border); border-radius: var(--radius-md); margin-bottom: 6px;
    }
    .file-name { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text); }
    .file-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text2); margin-top: 2px; }
    .file-dl {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 500; color: var(--blue);
      text-decoration: none; padding: 4px 10px;
      border: 0.5px solid var(--blue); border-radius: var(--radius-md); white-space: nowrap;
    }
    .file-dl:hover { background: rgba(55,138,221,0.1); }

    .notice {
      font-size: 12px; color: var(--text2); background: var(--bg2);
      border: 0.5px solid var(--border); border-radius: var(--radius-md);
      padding: 0.625rem 0.875rem; line-height: 1.6; margin-top: 0.5rem;
    }
  </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
<script>
// -- Streams disponibles --
const STREAMS = {
  onefm: {
    url: 'https://onefm.ice.infomaniak.ch/onefm-high.mp3',
    label: 'One FM',
    prefix: 'onefm-capture',
    accent: '#DC0814',
    accentDark: '#9A0610',
    accentHover: '#b5060f',
    waveColor: '#a5151d',
    sub: 'onefm-high.mp3 · pre-roll 60s · sauvegarde locale'
  },
  lac: {
    url: 'https://radiolac.ice.infomaniak.ch/radiolac-high.mp3',
    label: 'Radio Lac',
    prefix: 'radiolac-capture',
    accent: '#3FCFD5',
    accentDark: '#2a9499',
    accentHover: '#32b0b6',
    waveColor: '#31999d',
    sub: 'radiolac-high.mp3 · pre-roll 60s · sauvegarde locale'
  }
};

let currentStream = null;

const PRE_ROLL    = 60;
const SAMPLE_RATE = 44100;
const BITRATE     = 192;
const CHANNELS    = 2;
const BUFFER_SIZE = 4096;
const MAX_RING_CHUNKS = Math.ceil((SAMPLE_RATE * (PRE_ROLL + 5)) / BUFFER_SIZE);

let audioCtx, analyser, dataArray, animId, monitorGain;
let scriptProcessor, audioEl, srcNode;
let ringPCM = [], capturePCM = [], captureSnapshot = [];
let isBuffering = false, isCapturing = false, isMuted = false;
let prerollSec = 0, recSec = 0, snapshotSec = 0, postTarget = 120;
let prerollInterval = null, recInterval = null;
let lameReady = false;

const canvas = document.getElementById('waveform');
const ctx2   = canvas.getContext('2d');

// -- Sélection du flux --
function selectStream(key) {
  if (isBuffering) return;
  currentStream = STREAMS[key];

  const r = document.documentElement.style;
  r.setProperty('--accent',       currentStream.accent);
  r.setProperty('--accent-dark',  currentStream.accentDark);
  r.setProperty('--accent-hover', currentStream.accentHover);
  r.setProperty('--wave-color',   currentStream.waveColor);

  document.getElementById('btnOneFM').className = 'stream-btn' + (key === 'onefm' ? ' active-onefm' : '');
  document.getElementById('btnLac').className   = 'stream-btn' + (key === 'lac'   ? ' active-lac'   : '');
  document.getElementById('headerSub').textContent = currentStream.sub;
  document.getElementById('filePrefix').value = currentStream.prefix;

  // iOS : AudioContext doit être créé/résumé dans le même tick qu'un geste utilisateur
  if (lameReady) startStream();
}

// -- lamejs --
function checkLame() {
  if (typeof lamejs !== 'undefined') {
    lameReady = true;
    document.getElementById('encBadge').textContent = '✓ MP3 · 44.1kHz · Stéréo · 192kbps';
    document.getElementById('encBadge').style.color = 'var(--text)';
    setStatus('', 'Sélectionne un flux pour démarrer');
    log('Encodeur lamejs prêt');
  } else { setTimeout(checkLame, 200); }
}
setTimeout(checkLame, 300);

function setStatus(cls, txt) {
  document.getElementById('statusDot').className = 'dot ' + (cls || '');
  document.getElementById('statusText').textContent = txt;
}
function log(t) { document.getElementById('logLine').textContent = t; }
function fmt(s) { return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function toggleConfig() {
  const b = document.getElementById('cfgBody');
  b.classList.toggle('open');
  document.getElementById('cfgArrow').textContent = b.classList.contains('open') ? '▴' : '▾';
}

// -- Waveform --
function drawWave() {
  animId = requestAnimationFrame(drawWave);
  if (!analyser || !dataArray) return;
  const W = canvas.width  = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  analyser.getByteTimeDomainData(dataArray);
  ctx2.clearRect(0,0,W,H);
  ctx2.beginPath();
  ctx2.strokeStyle = isMuted
    ? '#555'
    : (currentStream ? currentStream.waveColor : '#555');
  ctx2.lineWidth = 1.5;
  const sw = W / dataArray.length;
  let x = 0;
  for (let i=0; i<dataArray.length; i++) {
    const raw = (dataArray[i]/128.0) - 1.0;
    const amp = Math.max(-1, Math.min(1, raw * 2.5));
    const y = (H/2) + amp*(H/2);
    i===0 ? ctx2.moveTo(x,y) : ctx2.lineTo(x,y);
    x += sw;
  }
  ctx2.lineTo(W, H/2);
  ctx2.stroke();
}

function drawFlatLine() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  const W = canvas.width  = canvas.offsetWidth  || canvas.clientWidth  || 480;
  const H = canvas.height = canvas.offsetHeight || canvas.clientHeight || 52;
  ctx2.clearRect(0,0,W,H);
  ctx2.beginPath();
  ctx2.strokeStyle = '#444';
  ctx2.lineWidth = 1.5;
  ctx2.moveTo(0, H/2);
  ctx2.lineTo(W, H/2);
  ctx2.stroke();
}

// -- Conversion Float32 → Int16 dithering TPDF avec noise shaping --
function float32ToInt16Dithered(f32) {
  const out = new Int16Array(f32.length);
  let prevErr = 0;
  for (let i=0; i<f32.length; i++) {
    let s = f32[i];
    if (s>1) s=1; if (s<-1) s=-1;
    const dither = (Math.random()-0.5)*0.3 + (Math.random()-0.5)*0.3;
    let val = Math.round(s*32767 + dither + prevErr*0.5);
    if (val>32767) val=32767; if (val<-32768) val=-32768;
    prevErr = s*32767 - val;
    out[i] = val;
  }
  return out;
}

// -- Worklet inline (remplace ScriptProcessor, élimine les glitches) --
const WORKLET_CODE = `
class PCMCapture extends AudioWorkletProcessor {
  constructor() { super(); this._buf = [[], []]; this._size = 0; this._MAX = 4096; }
  process(inputs) {
    const inp = inputs[0];
    if (!inp || !inp[0]) return true;
    const L = inp[0], R = inp[1] || inp[0];
    this._buf[0].push(new Float32Array(L));
    this._buf[1].push(new Float32Array(R));
    this._size += L.length;
    if (this._size >= this._MAX) {
      const flat = (ch) => {
        const out = new Float32Array(this._size);
        let off = 0;
        for (const b of this._buf[ch]) { out.set(b, off); off += b.length; }
        return out;
      };
      this.port.postMessage({ L: flat(0), R: flat(1) }, [flat(0).buffer, flat(1).buffer]);
      this._buf = [[], []]; this._size = 0;
    }
    return true;
  }
}
registerProcessor('pcm-capture', PCMCapture);
`;

// -- Fetch+decode stream pour iOS standalone --
async function fetchAndStreamAudio(url, ctx, sp, signal) {
  const resp = await fetch(url, { signal });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const reader = resp.body.getReader();
  let buf = new Uint8Array(0);
  const CHUNK = 128 * 1024;

  while (true) {
    const { done, value } = await reader.read();
    if (done || signal.aborted) break;
    const merged = new Uint8Array(buf.length + value.length);
    merged.set(buf); merged.set(value, buf.length);
    buf = merged;

    while (buf.length >= CHUNK) {
      const slice = buf.slice(0, CHUNK).buffer.slice(0);
      buf = buf.slice(CHUNK);
      try {
        const decoded = await ctx.decodeAudioData(slice);
        const src = ctx.createBufferSource();
        src.buffer = decoded;
        src.connect(sp);
        src.start();
      } catch(e) { /* chunk incomplet, on continue */ }
    }
  }
}

// -- Détection iOS standalone (WebApp ajoutée à l'écran d'accueil) --
const IS_IOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const IS_IOS_STANDALONE = IS_IOS && window.navigator.standalone === true;

// -- Connexion stream --
async function startStream() {
  if (!lameReady) { log('Encodeur pas encore prêt...'); return; }
  if (!currentStream) { log('Sélectionne un flux d\'abord'); return; }
  document.getElementById('btnOneFM').disabled = true;
  document.getElementById('btnLac').disabled   = true;

  setStatus('buffering', 'Connexion au stream...');
  log('Connexion à ' + currentStream.url);

  try {
    // AudioContext — webkitAudioContext pour iOS
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    monitorGain = audioCtx.createGain();
    monitorGain.gain.value = 1.0;

    const onChunk = (L, R) => {
      const chunk = { L: new Float32Array(L), R: new Float32Array(R) };
      ringPCM.push(chunk);
      if (ringPCM.length > MAX_RING_CHUNKS) ringPCM.shift();
      if (isCapturing) capturePCM.push(chunk);
    };

    if (IS_IOS_STANDALONE) {
      // ── BRANCHE iOS STANDALONE ──────────────────────────────────────────
      // createMediaElementSource est cassé dans ce mode.
      // On utilise un ScriptProcessor alimenté manuellement via fetch+decode.
      log('iOS standalone détecté');

      const sp = audioCtx.createScriptProcessor(BUFFER_SIZE, CHANNELS, CHANNELS);
      sp.connect(audioCtx.destination);
      scriptProcessor = sp;

      sp.onaudioprocess = (e) => {
        const Ldata = e.inputBuffer.getChannelData(0);
        const Rdata = e.inputBuffer.getChannelData(1);
        // Waveform manuel
        for (let i = 0; i < dataArray.length && i < Ldata.length; i++) {
          dataArray[i] = Math.round((Ldata[i] + 1) * 127.5);
        }
        // Mute géré ici (pas de monitorGain dans ce mode)
        const outL = e.outputBuffer.getChannelData(0);
        const outR = e.outputBuffer.getChannelData(1);
        const g = isMuted ? 0 : 1.0;
        for (let i = 0; i < Ldata.length; i++) { outL[i] = Ldata[i] * g; outR[i] = Rdata[i] * g; }
        onChunk(Ldata, Rdata);
      };

      streamAbort = new AbortController();
      fetchAndStreamAudio(currentStream.url, audioCtx, sp, streamAbort.signal)
        .catch(err => { if (err.name !== 'AbortError') { setStatus('error', err.message); log('Erreur: ' + err.message); }});

    } else {
      // ── BRANCHE STANDARD (Desktop, Android, iOS Safari normal) ──────────
      audioEl = new Audio();
      audioEl.crossOrigin = 'anonymous';
      audioEl.src = currentStream.url;
      audioEl.volume = 0.6;
      audioEl.playsInline = true;

      srcNode = audioCtx.createMediaElementSource(audioEl);
      srcNode.connect(analyser);
      analyser.connect(monitorGain);
      monitorGain.connect(audioCtx.destination);

      if (audioCtx.audioWorklet) {
        const wBlob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
        const wURL  = URL.createObjectURL(wBlob);
        await audioCtx.audioWorklet.addModule(wURL);
        URL.revokeObjectURL(wURL);
        const wNode = new AudioWorkletNode(audioCtx, 'pcm-capture', { numberOfInputs: 1, numberOfOutputs: 0, channelCount: CHANNELS });
        srcNode.connect(wNode);
        wNode.port.onmessage = (e) => onChunk(e.data.L, e.data.R);
        scriptProcessor = wNode;
        log('Capture via AudioWorklet');
      } else {
        const sp = audioCtx.createScriptProcessor(BUFFER_SIZE, CHANNELS, CHANNELS);
        const silentGain = audioCtx.createGain(); silentGain.gain.value = 0;
        srcNode.connect(sp); sp.connect(silentGain); silentGain.connect(audioCtx.destination);
        sp.onaudioprocess = (e) => onChunk(
          new Float32Array(e.inputBuffer.getChannelData(0)),
          new Float32Array(e.inputBuffer.getChannelData(1))
        );
        scriptProcessor = sp;
        log('Capture via ScriptProcessor (fallback)');
      }

      await new Promise((resolve, reject) => { audioEl.oncanplay = resolve; audioEl.onerror = reject; audioEl.load(); });
      await audioEl.play();
    }

    isBuffering = true;

    document.getElementById('btnTrigger').disabled = false;
    document.getElementById('streamControls').style.display = 'grid';
    document.getElementById('corsNotice').style.display = 'none';

    setStatus('buffering', 'Stream actif — accumulation du pré-roll...');
    log('Connecté — accumulation du pré-roll 60s...');

    prerollSec = 0;
    document.getElementById('prerollDisplay').className = 'timer-value active';

    prerollInterval = setInterval(() => {
      prerollSec = Math.min(prerollSec + 1, PRE_ROLL);
      document.getElementById('prerollDisplay').textContent = fmt(prerollSec);
      if (!isCapturing)
        document.getElementById('progressBar').style.width = (prerollSec/PRE_ROLL*100)+'%';
      if (prerollSec >= PRE_ROLL) {
        setStatus('ready', 'Pré-roll prêt (60s) — prêt à capturer');
        document.getElementById('prerollDisplay').className = 'timer-value rec';
      }
    }, 1000);

    drawWave();

  } catch(e) {
    document.getElementById('btnOneFM').disabled = false;
    document.getElementById('btnLac').disabled   = false;
    document.getElementById('corsNotice').style.display = 'block';
    setStatus('error', 'Erreur de connexion');
    log('Erreur: ' + e.message);
    console.error(e);
  }
}

// -- Capture --
function triggerCapture() {
  if (isCapturing) return;
  captureSnapshot = ringPCM.map(c => ({ L: new Float32Array(c.L), R: new Float32Array(c.R) }));
  snapshotSec = Math.round(captureSnapshot.length * BUFFER_SIZE / SAMPLE_RATE);
  capturePCM  = [];
  isCapturing = true;
  postTarget  = parseInt(document.getElementById('postDuration').value, 10);

  document.getElementById('btnTrigger').disabled = true;
  document.getElementById('btnStopCap').disabled = false;
  setStatus('recording', postTarget===0 ? 'Enregistrement en cours...' : 'Enregistrement — '+postTarget+'s restantes');

  recSec = 0;
  document.getElementById('recDisplay').className   = 'timer-value rec';
  document.getElementById('recDisplay').textContent = fmt(0);

  recInterval = setInterval(() => {
    recSec++;
    document.getElementById('recDisplay').textContent = fmt(recSec);
    if (postTarget > 0) {
      document.getElementById('progressBar').style.width = Math.min(recSec/postTarget*100,100)+'%';
      const rem = postTarget - recSec;
      if (rem>0) setStatus('recording', 'Enregistrement — '+rem+'s restantes');
      if (recSec>=postTarget) { clearInterval(recInterval); finalizeCapture(); }
    } else {
      setStatus('recording', 'Enregistrement — '+fmt(recSec)+' (stop manuel)');
    }
  }, 1000);

  log('Capture déclenchée — '+captureSnapshot.length+' chunks pré-roll'+(postTarget>0 ? ' + '+postTarget+'s auto' : ' + stop manuel'));
}

function stopCapture() {
  if (!isCapturing) return;
  clearInterval(recInterval);
  finalizeCapture();
}

// -- Encodage MP3 --
function encodeMp3(allChunks) {
  const mp3enc  = new lamejs.Mp3Encoder(CHANNELS, SAMPLE_RATE, BITRATE);
  const mp3Data = [];
  for (const chunk of allChunks) {
    const encoded = mp3enc.encodeBuffer(float32ToInt16Dithered(chunk.L), float32ToInt16Dithered(chunk.R));
    if (encoded.length>0) mp3Data.push(new Uint8Array(encoded));
  }
  const flushed = mp3enc.flush();
  if (flushed.length>0) mp3Data.push(new Uint8Array(flushed));
  return new Blob(mp3Data, { type: 'audio/mpeg' });
}

// -- Finalisation --
function finalizeCapture() {
  isCapturing = false;
  document.getElementById('btnStopCap').disabled = true;
  setStatus('done', 'Encodage MP3 en cours...');
  log('Encodage MP3 44.1kHz 192kbps...');

  setTimeout(() => {
    try {
      const blob     = encodeMp3([...captureSnapshot, ...capturePCM]);
      const prefix   = document.getElementById('filePrefix').value || (currentStream ? currentStream.prefix : 'capture');
      const now      = new Date();
      const ds       = now.toISOString().slice(0,19).replace(/[:T]/g,'-');
      const filename = prefix+'_'+ds+'.mp3';
      const sizekb   = (blob.size/1024).toFixed(0);
      const url      = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href=url; a.download=filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);

      const list = document.getElementById('filesList');
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML =
        '<div>'+
          '<div class="file-name">'+filename+'</div>'+
          '<div class="file-meta">'+sizekb+' KB · '+fmt(snapshotSec+recSec)+' · MP3 44.1kHz 192kbps</div>'+
        '</div>'+
        '<a class="file-dl" href="'+url+'" download="'+filename+'">↓ Re-télécharger</a>';
      list.insertBefore(item, list.firstChild);

      setStatus('done', 'Clip MP3 prêt — '+(blob.size/1024/1024).toFixed(1)+' MB');
      log('Enregistré — '+filename+' ('+sizekb+' KB · '+fmt(snapshotSec+recSec)+')');
    } catch(err) {
      setStatus('error', 'Erreur encodage: '+err.message);
      log('Erreur MP3: '+err.message);
      console.error(err);
    }
    document.getElementById('btnTrigger').innerHTML = '⏺ Capturer <kbd>Ctrl+Space</kbd>';
    document.getElementById('btnTrigger').disabled  = false;
    document.getElementById('progressBar').style.width = '100%';
  }, 50);
}

// -- Mute --
function toggleMute() {
  if (!isBuffering) return;
  const btn = document.getElementById('btnMute');
  isMuted = !isMuted;
  // Mode standard : monitorGain; mode iOS standalone : géré dans onaudioprocess
  if (monitorGain) monitorGain.gain.value = isMuted ? 0 : 1.0;
  btn.textContent = isMuted ? '🔊 Unmute' : '🔇 Mute';
  isMuted ? btn.classList.add('active') : btn.classList.remove('active');
}

// -- Stop stream --
function teardownStream() {
  if (streamAbort)     { streamAbort.abort(); streamAbort = null; }
  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (srcNode)         { srcNode.disconnect(); srcNode = null; }
  if (audioEl)         { audioEl.pause(); audioEl.src = ''; audioEl = null; }
  if (audioCtx)        { audioCtx.close(); audioCtx = null; }
  if (prerollInterval) { clearInterval(prerollInterval); prerollInterval = null; }
  if (animId)          { cancelAnimationFrame(animId); animId = null; }
  drawFlatLine();
  isBuffering = false;
  ringPCM = []; capturePCM = []; captureSnapshot = [];
  document.getElementById('btnTrigger').disabled = true;
  document.getElementById('btnStopCap').disabled = true;
  document.getElementById('streamControls').style.display = 'none';
  document.getElementById('btnOneFM').disabled = false;
  document.getElementById('btnLac').disabled   = false;
  isMuted = false;
  if (monitorGain) { monitorGain.gain.value = 1.0; monitorGain = null; }
  const btnMute = document.getElementById('btnMute');
  btnMute.textContent = '🔇 Mute';
  btnMute.classList.remove('active');
  setStatus('', 'Arrêté');
  log('Stream déconnecté');
}

function stopAll() {
  if (isCapturing) {
    clearInterval(recInterval);
    finalizeCapture(); // encode + télécharge le clip en cours
  }
  teardownStream();   // coupe le stream dans tous les cas
}

// -- Raccourci clavier Ctrl+Space --
document.addEventListener('keydown', (e) => {
  if (e.code==='Space' && (e.ctrlKey||e.metaKey)) {
    e.preventDefault(); e.stopPropagation();
    if (!isBuffering) { log('Raccourci : stream non connecté'); return; }
    if (!isCapturing) triggerCapture(); else stopCapture();
  }
});

document.addEventListener('DOMContentLoaded', () => { drawFlatLine(); });
</script>
